<script>

let currentTotal = 0;
let cart = [];
let selectedCourse ="unselected";
let selected = false;

</script>


<script>

function addToCart(productId) 

{
if(productId==1){
selectedCourse = "Rhynoplasty";
}
else if(productId==2){
selectedCourse = "Filler";
}
else if(productId==3){
selectedCourse = "Aesthetic";
}
const product = document.querySelector(`.image-grid[data-id='${productId}']`);
      const name = product.getAttribute('data-name');
      const price = parseFloat(product.getAttribute('data-price'));
const image = product.getAttribute('data-img');
       const existingItem = cart.find(item => item.id === productId );
      if (existingItem || selected ) {
        alert("You can select 1 choice. To prevent overcharge rate.");
}else {
        cart.push({ img:image, id: productId, name, price });
}
      selected=true;
      saveCart();
      renderCart();
}


function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      selected = false;
      saveCart();
      renderCart();
    }

function renderCart() 
{
   const cartContainer = document.getElementById('cart');
   cartContainer.innerHTML = cart.map(item => `
     <div class="cart-item">
    <center><img src="${item.img}" class='cart-img'></img></center>
    <center><div class="sum">$${item.price.toFixed(2)}</center>
    <center><button class="logout-button" onclick="removeFromCart(${item.id})">remove</button></center>
    <center><button class="logout-button" onclick="payNow()">get ticket</button></center>
</div>
                </div>
           `).join('');
const total = cart.reduce((sum, item) => sum + item.price , 0);
currentTotal = total;
document.getElementById('total').textContent = total.toFixed(2);
    }

function saveCart() {
localStorage.setItem('cart_civ', JSON.stringify(cart));
}

function loadCart() {
      const stored = localStorage.getItem(cart);
      if (stored) {
        cart = JSON.parse(stored);
        renderCart();
      }
    }


</script>



<script>
const express = require('express');
const app = express();
const port = 3000;

app.use(express.json());

app.post("/webhook/paypal", async (req, res) => {
    const body = req.body;

    if (body.event_type === "PAYMENT.SALE.COMPLETED") {
        const orderId = body.resource.parent_payment;
        const payerEmail = body.resource.payer.payer_info.email;
        const amount = body.resource.amount.total;

        // Save to database
        await saveOrderToDatabase(orderId, payerEmail, amount);

        res.sendStatus(200);
    } else {
        res.sendStatus(400);
    }
}
);
</script>

<script>
paypal.Buttons({
 style: {
        layout: 'vertical',
        color:  'blue',
        shape:  'rect',
        label:  'pay'
      },
  createOrder: function(data, actions) {
    return actions.order.create({
      purchase_units: [{
        amount: {
          value: currentTotal.toFixed(2)
        }
      }]
    });
  },
     onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            // ✅ Notify store owner here (via your backend)
            fetch('/notify-store-owner', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payerName: details.payer.name.given_name,
                    payerEmail: details.payer.email_address,
                    amount: details.purchase_units[0].amount.value
                })
            });
            alert('Transaction completed by ' + details.payer.name.given_name);
        });
    }
}).render('#paypal-button-container');

</script>

function showTab(index) {
    const tabs = document.querySelectorAll('.menu');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach((tab, i) => {
      tab.classList.toggle('active', i === index);
      contents[i].classList.toggle('active', i === index);
    });
  }
